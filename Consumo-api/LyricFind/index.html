<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <title>API music</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="flex flex-col items-center min-h-screen p-4 bg-gray-50">
    <section
      class="w-full max-w-2xl p-6 bg-white border border-gray-100 shadow-sm rounded-2xl"
    >
      <div class="flex flex-col gap-3 sm:flex-row">
        <input
          class="flex-1 px-4 py-3 transition-all border border-gray-300 outline-none rounded-xl focus:ring-2 focus:ring-blue-500 focus:border-transparent"
          type="text"
          id="searchMusic"
          placeholder="Ex: Bohemian Rhapsody"
        />
        <button
          class="px-6 py-3 font-semibold text-white transition-colors bg-blue-600 shadow-md hover:bg-blue-700 rounded-xl active:scale-95"
          id="btnSearch"
        >
          Buscar
        </button>
      </div>

      <div id="result" class="mt-8 transition-all">
        <div class="italic text-center text-gray-400">
          A letra aparecerá aqui após a busca.
        </div>
      </div>
    </section>

    <script src="index.js"></script>
  </body>
</html>
